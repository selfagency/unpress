name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run unit tests and platform checks
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20]

    steps:
      - uses: actions/checkout@v4
      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Run platform check
        run: node scripts/platform-check.js

  meili-integration:
    name: Meilisearch integration tests
    runs-on: ubuntu-latest
    needs: test
    services:
      meilisearch:
        image: getmeili/meilisearch:latest
        env:
          MEILI_MASTER_KEY: masterKey
        ports:
          - 7700:7700
        options: >-
          --health-cmd="curl -sS http://localhost:7700/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Meilisearch integration tests
        env:
          MEILI_HOST: http://127.0.0.1:7700
          MEILI_API_KEY: masterKey
        run: pnpm test -- tests/meilisearch.integration.test.ts

  accessibility:
    name: Accessibility scan (pa11y)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate site
        run: pnpm dev:cli -- --generate-site --out-dir ./out
      - name: Serve generated site
        run: npx http-server ./out/site -p 8080 &
      - name: Wait for server
        run: npx wait-on http://127.0.0.1:8080 -t 30000
      - name: Run pa11y scan
        run: npx pa11y http://127.0.0.1:8080
      - name: Lint markdown
        run: pnpm run lint:md
name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint (Oxc)
        run: pnpm run lint

      - name: Format check (Oxc)
        run: pnpm run format:check

      - name: Markdown lint (Rumdl)
        run: pnpm run lint:md

      - name: Test (Vitest)
        run: pnpm run test:coverage --reporter=default --reporter=junit --outputFile=test-report.junit.xml

      - name: Prepare OpenAPI spec for docs build
        run: |
          test -f src/generated/openapi.json || { echo "Missing required file: src/generated/openapi.json"; exit 1; }
          mkdir -p output
          cp src/generated/openapi.json output/openapi-types.json

      - name: Build docs (VitePress)
        run: pnpm run docs:build

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
