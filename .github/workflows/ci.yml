name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint (Oxc)
        run: pnpm run lint

      - name: Format check (Oxc)
        run: pnpm run format:check

      - name: Markdown lint (Rumdl)
        run: pnpm run lint:md

      - name: Test (Vitest)
        run: pnpm run test:coverage --reporter=default --reporter=junit --outputFile=test-report.junit.xml

      - name: Prepare OpenAPI spec for docs build
        run: |
          test -f src/generated/openapi.json || { echo "Missing required file: src/generated/openapi.json"; exit 1; }
          mkdir -p output
          cp src/generated/openapi.json output/openapi-types.json

      - name: Build docs (VitePress)
        run: pnpm run docs:build

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
