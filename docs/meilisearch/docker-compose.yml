version: '3.8'
services:
  meilisearch:
    # Pin image to a specific version (avoid `latest`) and run with reduced privileges
    image: getmeili/meilisearch:v1.12
    container_name: meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./meili_data:/data.ms
    # Run container as non-root user and disable privilege escalation
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
